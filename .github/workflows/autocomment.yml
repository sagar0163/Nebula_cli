name: Auto Comment

on:
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { issue, pullRequest, action } = context;
            
            if (action === 'opened') {
              if (pullRequest) {
                // PR opened
                github.rest.issues.createComment({
                  issue_number: pullRequest.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '🎉 Thank you for the PR! We will review it shortly.'
                });
              } else {
                // Issue opened
                github.rest.issues.createComment({
                  issue_number: issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: 'Thanks for opening this issue! We will look into it.'
                });
              }
            }
